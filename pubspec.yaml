name: careconnect
description: "CareConnect — A premium elderly care coordination mobile application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0

  # State & Utilities
  provider: ^6.1.0
  intl: ^0.19.0
  image_picker: ^1.2.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # Google Calendar (SMAP-26)
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  http: ^1.2.1
  firebase_ai: ^2.3.0

  # SMAP-31: Open appointment location in Google Maps
  url_launcher: ^6.3.0

  # SMAP-34: PDF report generation & share/download
  pdf: ^3.11.1
  printing: ^5.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true